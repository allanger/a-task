name: Test the module

on: push

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
    steps:
    - uses: actions/checkout@v6
    - uses: little-core-labs/install-terraform@v2.0.0
    - run: ./test.sh
